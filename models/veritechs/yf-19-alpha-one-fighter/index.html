<!DOCTYPE html>

<html>
	<head>

		<!-- css -->

		<link rel="stylesheet" href="/css/css.css" type="text/css" />

		<!-- libraries -->

		<script src="/javascript/jquery-3.4.1.min.js" type="text/javascript"></script>

		<!-- scripts -->

		<script src="/javascript/modules.js" type="text/javascript"></script>

	</head>

	<body>
		<div id="drawer"></div>

		<!-- interactive render container -->

		<canvas class="cursor-move" id="model-canvas"></canvas>

		<!-- BEGIN 3D VIEWER -->

		<script type="module">

			import * as THREE from '/build/three.module.js';

			import { ColladaLoader } from '/jsm/loaders/ColladaLoader.js';

			import { OrbitControls } from '/jsm/controls/OrbitControls.js';

			function init() {

				// canvas

				var canvas = document.querySelector('#model-canvas');

				// renderer

				var renderer = new THREE.WebGLRenderer( { canvas, antialias: true, alpha: true } );

				renderer.setClearColor( 0x000000, 0 );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.shadowMap.enabled = true;
				renderer.shadowMap.type = THREE.PCFSoftShadowMap;

				// camera

				var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);

				camera.position.set( 45, 30, 45 );
				camera.lookAt( 0, 0, 0 );

				// scene

				var scene = new THREE.Scene();

				// controls

				var controls = new OrbitControls( camera, renderer.domElement );

				controls = new OrbitControls( camera, renderer.domElement );

				controls.keys = {
					LEFT: 'ArrowLeft',
					UP: 'ArrowUp',
					RIGHT: 'ArrowRight',
					BOTTOM: 'ArrowDown'
				}

				controls.mouseButtons = {
					LEFT: THREE.MOUSE.ROTATE,
					MIDDLE: THREE.MOUSE.PAN,
					RIGHT: THREE.MOUSE.ROTATE

					// RIGHT: THREE.MOUSE.DOLLY
				}

				controls.screenSpacePanning = true;
				controls.enablePan = true;
				controls.target.set( 0, 0, 0 );
				controls.minDistance = 0.1;
				controls.maxDistance = 0.8;

				controls.update();

				// lights

				var ambientLight = new THREE.AmbientLight( 0xffffff, 1 );

				// scene.add( ambientLight );

				// directional lights

				var dirLight = new THREE.DirectionalLight( 0xffffff, 0.125 );

				dirLight.position.set( 0, 10, 10 );
				dirLight.castShadow = true;
				dirLight.shadow.mapSize.width = 512;
				dirLight.shadow.mapSize.height = 512;
				dirLight.shadow.camera.near = 512;
				dirLight.shadow.camera.far = 512;

				scene.add( dirLight );

				// hemispherical lights

				var hemiLight = new THREE.HemisphereLight( 0xffffff, 0xcccccc, 0.75 );

				hemiLight.position.set( 0, 10, 0 );
				// hemiLight.castShadow = true;

				scene.add( hemiLight );

				// point lights

				var pointLight = new THREE.PointLight( 0xffffff, 0.125, 0, 2 );

				pointLight.position.set(0, 10, 10);
				pointLight.castShadow = true;
				pointLight.shadow.mapSize.width = 512;
				pointLight.shadow.mapSize.height = 512;
				pointLight.shadow.camera.near = 512;
				pointLight.shadow.camera.far = 512;

				// scene.add( pointLight );

				// loader

				var loader = new ColladaLoader();

				loader.load( '/models/veritechs/yf-19-alpha-one-fighter/exports/yf-19-alpha-one-fighter.dae', function ( collada ) {

					var collada = collada.scene;

					// load model

					scene.add( collada );

					// helpers

					// lights

					// scene.add( new THREE.DirectionalLightHelper( dirLight, 0 , 0xaaaaaa ) );
					// scene.add( new THREE.HemisphereLightHelper( hemiLight, 5 , 0xaaaaaa ) );
					// scene.add( new THREE.PointLightHelper( pointLight, 0 , 0xaaaaaa ) );

					// bounding box

					var boundingboxHelper = new THREE.BoxHelper( model, 0xaaaaaa );

					// scene.add( boundingboxHelper );

					// grids

					// orthogonal grid

					const orthogonalGrid = new THREE.GridHelper( 0.5, 16, 0xaaaaaa, 0xaaaaaa );

					orthogonalGrid.position.y = 0;
					orthogonalGrid.position.x = 0;

					// scene.add( orthogonalGrid );

					// polar grid

					const polarGridHelper = new THREE.PolarGridHelper( 0.5, 32, 32, 32, 0xaaaaaa, 0xaaaaaa );

					polarGridHelper.position.y = 0;
					polarGridHelper.position.x = 0;

					// scene.add( polarGridHelper );


				} );

				// resize

				function resize () {

					const canvas = renderer.domElement;

					const width = canvas.clientWidth;
					const height = canvas.clientWidth;

					const resizeNeeded = canvas.width !== width || canvas.height !== height;

					if ( resizeNeeded ) {

						renderer.setSize ( width, height, false );
					}

					return resizeNeeded;
				}

				function render() {

					if ( resize ( renderer ) ) {

						const canvas = renderer.domElement;
						camera.aspect = canvas.clientWidth / canvas.clientHeight;
						camera.updateProjectionMatrix();

					}

					renderer.render( scene, camera );
					requestAnimationFrame( render );
				}

				requestAnimationFrame( render );

			}

			init();

		</script>

		<!-- END 3D VIEWER -->


		<!-- paypal -->

		<div class="paypal">

			<div class="grid grid-column grid-stretch">

				<div class="grid-cell">

					<div class="text-center">

						<div id="paypal-button-container"></div>

						<script src="https://www.paypal.com/sdk/js?client-id=sb&enable-funding=venmo&currency=USD" data-sdk-integration-source="button-factory"></script>

						<script>

							function initPayPalButton() {

								paypal.Buttons({
								style: {
									shape: 'rect',
									color: 'black',
									layout: 'horizontal',
									label: 'paypal',
								},

								createOrder: function(data, actions) {

									return actions.order.create({

									purchase_units: [{"description":"Instructions","amount":{"currency_code":"USD","value":20}}]

									});

								},

								onApprove: function(data, actions) {

									return actions.order.capture().then(function(orderData) {

									// log full order details

									console.log('Capture result', orderData, JSON.stringify(orderData, null, 2));

									// show a success message within this page after transaction

									const element = document.getElementById('paypal-button-container');

									element.innerHTML = '';

									element.innerHTML = '<h3>Thank you for your payment!</h3>';

									// or go to another URL after transaction

									// actions.redirect('thank_you.html');

									});
								},

								onError: function(err) {

									console.log(err);

								}

								}).render('#paypal-button-container');

								}

							initPayPalButton();

						</script>

					</div>

				</div>

			</div>

		</div>

		<!-- model -->

		<section id="model">

			<div class="grid grid-column grid-stretch">

				<div class="grid-cell">

					<div>VERITECHS</div>

				</div>

				<div class="button">

					<div class="grid grid-middle">

						<div class="grid">

							<div class="logo-green icon icon-flex"></div>

						</div>

						<div class="grid-cell">

							<div class="text-center">VERITECHS // YF 19 ALPHA ONE FIGHTER</div>

						</div>

					</div>

				</div>

			</div>

		</section>

		<section id="footer">

		</section>

	</body>

</html>
