<html>

	<head>

		<!-- css -->

		<link rel="stylesheet" href="/css/css.css" type="text/css" />

		<!-- libraries -->

		<script src="/javascript/jquery-3.7.0.min.js" type="text/javascript"></script>

		<!-- scripts -->

		<script src="/javascript/modules.js" type="text/javascript"></script>

		<script type="importmap">

			{

				"imports": {

					"three": "/javascript/three/three.module.js",

					"three/addons/": "/javascript/three/modules/"

				}

			}

		</script>

	</head>

	<body>

		<div id="drawer">

		</div>

		<!-- interactive render container -->

		<canvas id="canvas" class="cursor-move"></canvas>

		<!-- BEGIN 3D VIEWER -->

		<script type="module">

			import * as THREE from 'three';

			import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import { TransformControls } from 'three/addons/controls/TransformControls.js';

			function initialize () {

				// viewport

				const factor = 0.1;

				const near = (factor * 4 );
				const far = (near * 4 );

				const viewportWidth = window.innerWidth;
				const viewportHeight = window.innerHeight;

				const viewportRatio = viewportWidth / viewportHeight;

				// canvas

				var canvas = document.querySelector ('#canvas');

				// renderer

				var renderer = new THREE.WebGLRenderer ( { canvas, precision: 'highp', antialias: true, alpha: true } );

				renderer.setClearColor ( 0x000000, 0 );
				renderer.setPixelRatio ( window.devicePixelRatio );
				renderer.setSize ( viewportWidth, viewportHeight );

				renderer.shadowMap.enabled = true;
				renderer.shadowMap.type = THREE.PCFSoftShadowMap;

				// scene

				var scene = new THREE.Scene ();

				// camera

				var cameraPerspective = new THREE.PerspectiveCamera (45, viewportRatio, 0.1, 5000);
				var cameraOrthogonal = new THREE.OrthographicCamera ( viewportWidth / - 2, viewportWidth / 2, viewportHeight / 2, viewportHeight / - 2, 1, 1000 );

				// set camera type

				var camera = cameraPerspective;

				camera.position.set ( 45, 30, 45 );

				camera.lookAt ( 0, 0, 0 );

				// loader

				var loader = new ColladaLoader ();

				var model = loader.load( '/models/mobile-suits/xxxg-01h2-heavyarms/exports/xxxg-01h2-heavyarms.dae', function ( collada ) {

					var collada = collada.scene;

					// edges

					// collada.children[0].children.forEach ( function (node) {

					// 	node.material.polygonOffset = true;
					// 	node.material.polygonOffsetFactor = 1;
					// 	node.material.polygonOffsetUnits = 1;

					// 	var edge = new THREE.EdgesHelper(node, 0xff0000);

					// 	edge.material.linewidth = 5;

					// 	scene.add(edge);

					// });

					// enable shadow mapping for individual elements

					// mesh traverse

					collada.traverse (function (node) {

						if (node.isMesh)

							// console.log (node);

							node.castShadow = true;

							node.receiveShadow = true;

					});

					// load model

					scene.add (collada);

					// lights

					var ambientLight = new THREE.AmbientLight ( 0xffffff, 0.50 );

					scene.add ( ambientLight );

					// hemispherical lights

					var hemisphereLight = new THREE.HemisphereLight ( 0xffffff, 0x000000, 1.00 );

					hemisphereLight.position.x = 0.0;
					hemisphereLight.position.y = 3.0;
					hemisphereLight.position.z = 0.0;

					scene.add ( hemisphereLight );

					// point light

					var pointLight = new THREE.PointLight( 0xffffff, 1.00, 0.00, 2.00 );

					pointLight.position.x = 2.0;
					pointLight.position.y = 2.0;
					pointLight.position.z = 2.0;

					pointLight.castShadow = true;

					pointLight.shadow.bias = - 0.0125;
					pointLight.shadow.camera.far = near;
					pointLight.shadow.camera.near = near;
					pointLight.shadow.focus = 0.25;
					pointLight.shadow.mapSize.height = 4096;
					pointLight.shadow.mapSize.width = 4096;

					scene.add ( pointLight );

					// directional lights

					var directionalLight = new THREE.DirectionalLight ( 0xffffff, 1.00 );

					directionalLight.position.x = 1.0;
					directionalLight.position.y = 1.0;
					directionalLight.position.z = 1.0;

					directionalLight.castShadow = true;

					directionalLight.shadow.bias = - 0.0125;
					directionalLight.shadow.camera.far = near;
					directionalLight.shadow.camera.near = near;
					directionalLight.shadow.focus = 0.25;
					directionalLight.shadow.mapSize.height = 4096;
					directionalLight.shadow.mapSize.width = 4096;

					scene.add ( directionalLight );

					// spotLight

					var spotLight = new THREE.SpotLight ( 0xffffff, 2.50, 1000 ) ;

					spotLight.position.x = 0.5;
					spotLight.position.y = 0.5;
					spotLight.position.z = 0.5;

					spotLight.castShadow = true;

					spotLight.shadow.bias = - 0.0125;
					spotLight.shadow.camera.far = near;
					spotLight.shadow.camera.near = near;
					spotLight.shadow.focus = 0.25;
					spotLight.shadow.mapSize.height = 4096;
					spotLight.shadow.mapSize.width = 4096;

					spotLight.target = collada;

					scene.add ( spotLight );

					// manual update for static scene setup

					// scene.matrixAutoUpdate = false;

					scene.updateMatrix ();

					// helpers

					var helperLineColor = 0xaaaaaa;

					// camera

					var cameraHelper = new THREE.CameraHelper ( spotLight.shadow.camera, 0.25 , helperLineColor );

					// scene.add ( cameraHelper);

					// lights

					var directionalLightHelper = new THREE.DirectionalLightHelper ( directionalLight, 0.25 , helperLineColor )

					// scene.add ( directionalLightHelper );

					var hemisphereLightHelper = new THREE.HemisphereLightHelper ( hemisphereLight, 0.25 , helperLineColor );

					// scene.add ( hemisphereLightHelper );

					var pointLightHelper = new THREE.PointLightHelper ( pointLight, 0.25 , helperLineColor )

					// scene.add ( pointLightHelper );

					var spotLightHelper = new THREE.SpotLightHelper ( spotLight, 0.25 , helperLineColor )

					// scene.add ( spotLightHelper );

					// bounding box

					var boundingboxHelper = new THREE.BoxHelper ( collada, helperLineColor );

					// scene.add ( boundingboxHelper );

					// plane

					var planeGeometry = new THREE.PlaneGeometry ( 1, 1 );
					var planeMaterial = new THREE.MeshBasicMaterial ( {color: 0xdddddd, side: THREE.DoubleSide} );
					var plane = new THREE.Mesh ( planeGeometry, planeMaterial );

					plane.rotation.x = -0.5 * Math.PI;

					var baseBox = new THREE.Box3().setFromObject ( collada )

					var modelTop = baseBox.max.y;
					var modelBottom = baseBox.min.y;

					plane.position.y = modelBottom;

					plane.receiveShadow = true;

					// scene.add ( plane );

					// grid

					// orthogonal grid

					const orthogonalGridHelper = new THREE.GridHelper ( 1, 32, helperLineColor, helperLineColor );

					orthogonalGridHelper.position.y = modelBottom;

					orthogonalGridHelper.position.x = 0;

					// orthogonalGridHelper.position.y = 0;

					// scene.add ( orthogonalGridHelper );

					// polar grid

					const polarGridHelper = new THREE.PolarGridHelper ( 0.5, 32, 32, 32, helperLineColor, helperLineColor );

					polarGridHelper.position.y = modelBottom;

					polarGridHelper.position.x = 0;

					// polarGridHelper.position.y = 0;

					// scene.add ( polarGridHelper );

					// orbit controls

					var orbitControls = new OrbitControls ( camera, renderer.domElement );

					orbitControls.keys = {
						LEFT: 'ArrowLeft',
						UP: 'ArrowUp',
						RIGHT: 'ArrowRight',
						BOTTOM: 'ArrowDown'
					}

					orbitControls.mouseButtons = {
						LEFT: THREE.MOUSE.ROTATE,
						MIDDLE: THREE.MOUSE.PAN,
						RIGHT: THREE.MOUSE.ROTATE

						// RIGHT: THREE.MOUSE.DOLLY
					}

					orbitControls.screenSpacePanning = true;
					orbitControls.enablePan = true;
					orbitControls.target.set ( 0, 0, 0 );
					orbitControls.minDistance = near;
					orbitControls.maxDistance = far;

					orbitControls.update ();

					// transform controls

					var transformControls = new TransformControls ( camera, renderer.domElement );

					transformControls.enabled = false;

					transformControls.showX = false;
					transformControls.showY = false;
					transformControls.showZ = false;

					transformControls.addEventListener ( 'change', render );

					transformControls.addEventListener ( 'change', function (event) {

						orbitControls.enabled = false;

					})

					window.addEventListener ( 'keydown', function ( event ) {

						switch ( event.keyCode ) {

							// C //

							case 67:
								const position = camera.position.clone ();

								camera = camera.isPerspectiveCamera ? cameraOrthogonal : cameraPerspective;
								camera.position.copy ( position );

								orbit.object = camera;
								transformControls.camera = camera;

								camera.lookAt ( orbit.target.x, orbit.target.y, orbit.target.z );

								resize ();

								break;

							// V //

							case 86:
								const randomFieldOfView = Math.random () + 0.1;
								const randomZoom = Math.random () + 0.1;

								cameraPerspective.fov = randomFieldOfView * 160;
								cameraOrthogonal.bottom = - randomFieldOfView * 500;
								cameraOrthogonal.top = randomFieldOfView * 500;

								cameraPerspective.zoom = randomZoom * 5;
								cameraOrthogonal.zoom = randomZoom * 5;

								resize ();

								break;

							// SPACE //

							case 32:

								transformControls.enabled = ! transformControls.enabled;

								break;

							// X //

							case 88:

								transformControls.showX = ! transformControls.showX;

								break;

							// Y //

							case 89:

								transformControls.showY = ! transformControls.showY;

								break;

							// Z //

							case 90:

								transformControls.showZ = ! transformControls.showZ;

								break;

							// L //

							case 76:

								transformControls.setSpace ( transformControls.space === "local" );

								break;

							// W //

							case 87:

								transformControls.setSpace ( transformControls.space === "world" );

								break;

							// SHIFT //

							case 16:

								transformControls.setTranslationSnap ( 100 );
								transformControls.setRotationSnap ( THREE.MathUtils.degToRad ( 15 ) );
								transformControls.setScaleSnap ( 0.25 );

								break;

							// EQUAL [ = ] //
							// ADD [ + ] //

							case 187:
							case 107:

								transformControls.setSize ( transformControls.size + 0.1 );

								break;

							// DASH [ — ] //
							// SUBTRACT [ - ] //

							case 189:
							case 109:

								transformControls.setSize ( Math.max ( transformControls.size - 0.1, 0.1 ) );

								break;

							// T //

							case 84:

								transformControls.setMode( "translate" );

								break;

							// R //

							case 82:

								transformControls.setMode( "rotate" );

								break;

							// S //

							case 83:

								transformControls.setMode( "scale" );

								break;

						}

					} );

					transformControls.attach ( collada );

					scene.add ( transformControls );

					// client window aspect ratio

					window.addEventListener ( 'resize', resize );

				} );

				// resize

				function resize () {

					camera.aspect = window.innerWidth / window.innerHeight;

					camera.updateProjectionMatrix ();

					renderer.setSize ( window.innerWidth, window.innerHeight );

				}

				function render () {

					if ( resize ( renderer ) ) {

						const canvas = renderer.domElement;

						camera.aspect = canvas.clientWidth / canvas.clientHeight;

						camera.updateProjectionMatrix ();

					}

					renderer.render( scene, camera );

					requestAnimationFrame( render );
				}

				requestAnimationFrame( render );

			}

			initialize ();

		</script>

		<!-- END 3D VIEWER -->

		<div class="paypal-id">

			[ ID // NOT YET AVAILABLE FOR PURCHASE ] - US$ 20.00

	</body>
