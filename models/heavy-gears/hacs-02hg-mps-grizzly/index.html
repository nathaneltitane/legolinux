<!DOCTYPE html>

<html>

	<head>

		<!-- css -->

		<link rel="stylesheet" href="/css/css.css" type="text/css" />

		<!-- libraries -->

		<script src="/javascript/jquery-3.7.0.min.js" type="text/javascript"></script>

		<!-- scripts -->

		<script src="/javascript/modules.js" type="text/javascript"></script>

		<script src="/javascript/hover.js" type="text/javascript"></script>

		<script src="/javascript/helper.js" type="text/javascript"></script>

		<script src="/javascript/samples.js" type="text/javascript"></script>

		<script src="/javascript/footer.js" type="text/javascript"></script>

		<script type="importmap">

			{

				"imports": {

					"three": "/javascript/three/three.module.js",

					"three/addons/": "/javascript/three/modules/"

				}

			}

		</script>

	</head>

	<body>

		<!-- start webgl canvas -->

		<canvas id="canvas" class="cursor-move"></canvas>

		<script type="module">

			import * as THREE from 'three';

			import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import { TransformControls } from 'three/addons/controls/TransformControls.js';

			function initialize ( ) {

				const startTime = performance.now ( );

				var self  = this;

				// viewport

				const factor = 0.1;

				const near = ( factor * 4 );
				const far  = ( near * 4 );

				const cameraNear = ( factor );
				const cameraFar  = ( factor * 4 * 1000 );

				const viewportWidth = window.innerWidth;
				const viewportHeight = window.innerHeight;

				const viewportRatio = viewportWidth / viewportHeight;

				const left   = - ( viewportRatio / 2 );
				const right  =   ( viewportRatio / 2 );
				const top    =   ( viewportRatio / 2 );
				const bottom = - ( viewportRatio / 2 );

				// colors

				var black    = 0x000000;
				var charcoal = 0x333333;
				var white    = 0xffffff;
				var cloud    = 0xfefefe;
				var grey     = 0xaaaaaa;
				var red      = 0xff0000;
				var green    = 0x008000;
				var blue     = 0x0000ff;
				var purple   = 0x800080;
				var orange   = 0xffa500;
				var yellow   = 0xffff00;

				// canvas

				this.canvas = document.querySelector ('#canvas');

				// renderer

				this.renderer = new THREE.WebGLRenderer ( { canvas, precision: 'highp', antialias: true, alpha: true } );

				this.renderer.setClearColor ( black, 0 );
				this.renderer.setPixelRatio ( window.devicePixelRatio );
				this.renderer.setSize ( viewportWidth, viewportHeight );
				this.renderer.clear ( );

				this.renderer.shadowMap.enabled = true;
				this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

				// scene

				this.scene = new THREE.Scene ( );

				// camera

				// perspective

				this.perspectiveCamera = new THREE.PerspectiveCamera (
					45,									// fov
					viewportRatio,						// aspect
					cameraNear,							// near
					cameraFar							// far
				);

				// orthographic

				this.orthographicCamera = new THREE.OrthographicCamera (
					left,								// left - frustum
					right,								// right - frustum
					top,								// top - frustum
					bottom, 							// bottom - frustum
					cameraNear,							// near
					cameraFar							// far
				);

				// set camera type

				this.camera = self.perspectiveCamera;

				this.camera.position.set ( 45, 30, 45 );

				this.camera.lookAt ( 0, 0, 0 );

				if ( this.camera.isOrthographicCamera ) {

					this.camera.zoom = 3000;
				}

				else {

					this.camera.zoom = 2;

				}

				// lights

				// ambient light

				this.ambientLight_color = white;
				this.ambientLightHelper_color = null;

				this.ambientLight = new THREE.AmbientLight (
					this.ambientLight_color,			// color
					0.25								// intensity
				);

				this.scene.add ( this.ambientLight );

				// hemispherical light

				this.hemisphereLight_color = white;
				this.hemisphereLightHelper_color = black;

				this.hemisphereLight = new THREE.HemisphereLight (
					this.hemisphereLight_color,			// color - sky
					black,								// color - ground
					0.75								// intensity
				);

				this.hemisphereLight.position.x = 0.0;
				this.hemisphereLight.position.y = 3.0;
				this.hemisphereLight.position.z = 0.0;

				this.scene.add ( this.hemisphereLight );

				// point light

				this.pointLight_color = white;
				this.pointLightHelper_color = black;

				this.pointLight = new THREE.PointLight (
					this.pointLight_color,				// color
					1.00,								// intensity
					0.00,								// distance - 0 = no limit
					2.00								// decay
				);

				this.pointLight.position.x = 2.0;
				this.pointLight.position.y = 2.0;
				this.pointLight.position.z = 2.0;

				this.pointLight.castShadow = true;

				this.pointLight.shadow.bias = - 0.0125;
				this.pointLight.shadow.camera.far = far;
				this.pointLight.shadow.camera.near = near;
				this.pointLight.shadow.focus = 0.25;
				this.pointLight.shadow.mapSize.height = 4096;
				this.pointLight.shadow.mapSize.width = 4096;

				this.scene.add ( this.pointLight );

				// directional light - 0

				this.directionalLight_0_color = orange;
				this.directionalLight_0_Helper_color = orange;

				this.directionalLight_0 = new THREE.DirectionalLight (
				this.directionalLight_0_color,			// color
					0.25								// intensity
				);

				this.directionalLight_0.position.x = 1.0;
				this.directionalLight_0.position.y = 1.0;
				this.directionalLight_0.position.z = 1.0;

				this.directionalLight_0.castShadow = true;

				this.directionalLight_0.shadow.bias = - 0.0125;
				this.directionalLight_0.shadow.camera.far = far;
				this.directionalLight_0.shadow.camera.near = near;
				this.directionalLight_0.shadow.focus = 0.25;
				this.directionalLight_0.shadow.mapSize.height = 4096;
				this.directionalLight_0.shadow.mapSize.width = 4096;

				this.scene.add ( this.directionalLight_0 );

				// directional light - 1

				this.directionalLight_1_color = green;
				this.directionalLight_1_Helper_color = green;

				this.directionalLight_1 = new THREE.DirectionalLight (
				this.directionalLight_1_color,			// color
					0.25								// intensity
				);

				this.directionalLight_1.position.x = - 1.0;
				this.directionalLight_1.position.y = 1.0;
				this.directionalLight_1.position.z = 1.0;

				this.directionalLight_1.castShadow = true;

				this.directionalLight_1.shadow.bias = - 0.0125;
				this.directionalLight_1.shadow.camera.far = far;
				this.directionalLight_1.shadow.camera.near = near;
				this.directionalLight_1.shadow.focus = 0.25;
				this.directionalLight_1.shadow.mapSize.height = 4096;
				this.directionalLight_1.shadow.mapSize.width = 4096;

				this.scene.add ( this.directionalLight_1 );

				this.directionalLight_2_color = purple;
				this.directionalLight_2_Helper_color = purple;

				this.directionalLight_2 = new THREE.DirectionalLight (
				this.directionalLight_2_color,			// color
					0.25								// intensity
				);

				this.directionalLight_2.position.x = 0.0;
				this.directionalLight_2.position.y = 1.0;
				this.directionalLight_2.position.z = - 1.0;

				this.directionalLight_2.castShadow = true;

				this.directionalLight_2.shadow.bias = - 0.0125;
				this.directionalLight_2.shadow.camera.far = far;
				this.directionalLight_2.shadow.camera.near = near;
				this.directionalLight_2.shadow.focus = 0.25;
				this.directionalLight_2.shadow.mapSize.height = 4096;
				this.directionalLight_2.shadow.mapSize.width = 4096;

				this.scene.add ( this.directionalLight_2 );

				// spotLight

				this.spotLight_color = white;
				this.spotLightHelper_color = black;

				this.spotLight = new THREE.SpotLight (
					this.spotLight_color,				// color
					2.50,								// intensity
					1000,								// distance
					90,									// angle
					0.25,								// penumbra
					1.00								// decay
				) ;

				this.spotLight.position.x = 0.5;
				this.spotLight.position.y = 0.5;
				this.spotLight.position.z = 0.5;

				this.spotLight.castShadow = true;

				this.spotLight.shadow.bias = - 0.0125;
				this.spotLight.shadow.camera.far = far;
				this.spotLight.shadow.camera.near = near;
				this.spotLight.shadow.focus = 0.25;
				this.spotLight.shadow.mapSize.height = 4096;
				this.spotLight.shadow.mapSize.width = 4096;

				this.scene.add ( this.spotLight );

				// helpers

				// axes helper

				this.axesHelper = null;
				this.axesHelper_visible = false;

				this.get_axesHelper = function ( ) {

					if ( ! self.axesHelper ) {

						const axesLength  = 0.5;

						self.axesHelper = new THREE.AxesHelper ( axesLength );

					}

					return self.axesHelper;

				}

				this.axesHelper_ = function ( ) {

					if ( this.axesHelper_visible ) {

						this.axesHelper_visible = false;

						self.scene.remove ( self.get_axesHelper ( ) );
					}

					else {

						this.axesHelper_visible = true;

						self.scene.add ( self.get_axesHelper ( ) );
					}
				}

				// bounding box helper

				this.boundingBoxHelper_color = grey;

				this.boundingBoxHelper = null;
				this.boundingBoxHelper_visible = false;

				this.get_boundingBoxHelper = function ( ) {

					if ( ! self.boundingBoxHelper ) {

						self.boundingBoxHelper = new THREE.BoxHelper ( self.colladaImport, this.boundingBoxHelper_color );

						console.log ( "bounding box" );

					}

					return self.boundingBoxHelper;
				}

				this.boundingBoxHelper_ = function ( ) {

					if ( this.boundingBoxHelper_visible ) {

						this.boundingBoxHelper_visible = false;

						self.scene.remove ( self.get_boundingBoxHelper ( ) );

					}

					else {

						this.boundingBoxHelper_visible = true;

						self.scene.add ( self.get_boundingBoxHelper ( ) );
					}
				}

				// camera helper

				this.cameraHelper_color = null;

				this.cameraHelper = null;
				this.cameraHelper_visible = false;

				this.get_cameraHelper = function ( ) {

					if ( ! self.cameraHelper)  {

						self.cameraHelper = new THREE.CameraHelper ( self.spotLight.shadow.camera, 0.25 , this.cameraHelper_color );

						console.log ( "camera" );

					}

					return self.cameraHelper;

				}

				this.cameraHelper_ = function ( ) {

					if ( this.cameraHelper_visible ) {

						this.cameraHelper_visible = false;

						self.scene.remove ( self.get_cameraHelper ( ) );

					}

					else {

						this.cameraHelper_visible = true;

						self.scene.add ( self.get_cameraHelper ( ) );

					}

				}

				// hemisphere light helper

				this.hemisphereLightHelper = null;
				this.hemisphereLightHelper_visible = false;

				this.get_hemisphereLightHelper = function ( ) {

					if ( ! self.hemisphereLightHelper ) {

						self.hemisphereLightHelper = new THREE.HemisphereLightHelper ( self.hemisphereLight, 0.25 , this.hemisphereLightHelper_color );

						console.log ( "hemisphere light" );

					}

					return self.hemisphereLightHelper;

				}

				this.hemisphereLightHelper_ = function ( ) {

					if ( this.hemisphereLightHelper_visible ) {

						this.hemisphereLightHelper_visible = false;

						self.scene.remove ( self.get_hemisphereLightHelper ( ) );

					}

					else {

						this.hemisphereLightHelper_visible = true;

						self.scene.add ( self.get_hemisphereLightHelper ( ) );

					}

				}

				// point light helper

				this.pointLightHelper = null;
				this.pointLightHelper_visible = false;

				this.get_pointLightHelper = function ( ) {

					if ( ! self.pointLightHelper ) {

						self.pointLightHelper = new THREE.PointLightHelper ( self.pointLight, 0.25 , this.pointLightHelper_color )

						console.log ( "point light" );

					}

					return self.pointLightHelper;

				}

				this.pointLightHelper_ = function ( ) {

					if ( this.pointLightHelper_visible ) {

						this.pointLightHelper_visible = false;

						self.scene.remove ( self.get_pointLightHelper ( ) );

					}

					else {

						this.pointLightHelper_visible = true;

						self.scene.add ( self.get_pointLightHelper ( ) );

					}

				}

				// directional light helper - 0

				this.directionalLight_0_Helper = null;
				this.directionalLight_0_Helper_visible = false;

				this.get_directionalLight_0_Helper = function ( ) {

					if ( ! self.directionalLight_0_Helper ) {

						self.directionalLight_0_Helper = new THREE.DirectionalLightHelper ( self.directionalLight_0, 0.25 , this.directionalLight_0_Helper_color )

						console.log ( "directional light 0" );
					}

					return self.directionalLight_0_Helper;

				}

				this.directionalLight_0_Helper_ = function ( ) {

					if ( this.directionalLight_0_Helper_visible ) {

						this.directionalLight_0_Helper_visible = false;

						self.scene.remove ( self.get_directionalLight_0_Helper ( ) );

					}

					else {

						this.directionalLight_0_Helper_visible = true;

						self.scene.add ( self.get_directionalLight_0_Helper ( ) );

					}

				}

				// directional light helper - 1

				this.directionalLight_1_Helper = null;
				this.directionalLight_1_Helper_visible = false;

				this.get_directionalLight_1_Helper = function ( ) {

					if ( ! self.directionalLight_1_Helper ) {

						self.directionalLight_1_Helper = new THREE.DirectionalLightHelper ( self.directionalLight_1, 0.25 , this.directionalLight_1_Helper_color )

						console.log ( "directional light 1" );

					}

					return self.directionalLight_1_Helper;

				}

				this.directionalLight_1_Helper_ = function ( ) {

					if ( this.directionalLight_1_Helper_visible ) {

						this.directionalLight_1_Helper_visible = false;

						self.scene.remove ( self.get_directionalLight_1_Helper ( ) );

					}

					else {

						this.directionalLight_1_Helper_visible = true;

						self.scene.add ( self.get_directionalLight_1_Helper ( ) );

					}

				}

				// directional light helper - 2

				this.directionalLight_2_Helper = null;
				this.directionalLight_2_Helper_visible = false;

				this.get_directionalLight_2_Helper = function ( ) {

					if ( ! self.directionalLight_2_Helper ) {

						self.directionalLight_2_Helper = new THREE.DirectionalLightHelper ( self.directionalLight_2, 0.25 , this.directionalLight_2_Helper_color )

						console.log ( "directional light 2" );

					}

					return self.directionalLight_2_Helper;

				}

				this.directionalLight_2_Helper_ = function ( ) {

					if ( this.directionalLight_2_Helper_visible ) {

						this.directionalLight_2_Helper_visible = false;

						self.scene.remove ( self.get_directionalLight_2_Helper ( ) );

					}

					else {

						this.directionalLight_2_Helper_visible = true;

						self.scene.add ( self.get_directionalLight_2_Helper ( ) );

					}

				}

				// spotlight helper

				this.spotLightHelper = null;
				this.spotLightHelper_visible = false;

				this.get_spotLightHelper = function ( ) {

					if ( ! self.spotLightHelper ) {

						self.spotLightHelper = new THREE.SpotLightHelper ( self.spotLight, 0.25 , this.spotLightHelper_color )

						console.log ( "spotlight" );
					}

					return self.spotLightHelper;

				}

				this.spotLightHelper_ = function ( ) {

					if ( this.spotLightHelper_visible ) {

						this.spotLightHelper_visible = false;

						self.scene.remove ( self.get_spotLightHelper ( ) );

					}

					else {

						this.spotLightHelper_visible = true;

						self.scene.add ( self.get_spotLightHelper ( ) );

					}

				}

				// grids

				// polar grid helper

				this.polarGridHelper_color_min = orange;
				this.polarGridHelper_color_max = charcoal;

				this.polarGridHelper = null;
				this.polarGridHelper_visible = false;

				this.get_polarGridHelper = function ( ) {

					if ( ! self.polarGridHelper ) {

						self.polarGridHelper = new THREE.PolarGridHelper ( 0.5, 32, 32, 32, this.polarGridHelper_color_min, this.polarGridHelper_color_max );

						self.polarGridHelper.position.y = self.get_boundryBox ( ).min.y;

						self.polarGridHelper.position.x = 0;

						// self.polarGridHelper.position.y = 0;

						console.log ( "polar grid" );

					}

					return self.polarGridHelper;

				}

				this.polarGridHelper_ = function ( ) {

					if ( this.polarGridHelper_visible ) {

						this.polarGridHelper_visible = false;

						self.scene.remove ( self.get_polarGridHelper ( ) );

					}

					else {

						this.polarGridHelper_visible = true;

						self.scene.add ( self.get_polarGridHelper ( ) );

					}

				}

				// orthogonal grid helper

				this.orthogonalGridHelper_color_min = purple;
				this.orthogonalGridHelper_color_max = charcoal;

				this.orthogonalGridHelper = null;
				this.orthogonalGridHelper_visible = false;

				this.get_orthogonalGridHelper = function ( ) {

					if ( ! self.orthogonalGridHelper ) {

						self.orthogonalGridHelper = new THREE.GridHelper ( 1, 32, this.orthogonalGridHelper_color_min, this.orthogonalGridHelper_color_max );

						self.orthogonalGridHelper.position.y = self.get_boundryBox( ).min.y;

						self.orthogonalGridHelper.position.x = 0;

						// self.orthogonalGridHelper.position.y = 0;

						console.log ( "orthogonal grid" );
					}

					return self.orthogonalGridHelper;

				}

				this.orthogonalGridHelper_ = function ( ) {

					if ( this.orthogonalGridHelper_visible ) {

						this.orthogonalGridHelper_visible = false;

						self.scene.remove ( self.get_orthogonalGridHelper ( ) );

					}

					else {

						this.orthogonalGridHelper_visible = true;

						self.scene.add ( self.get_orthogonalGridHelper ( ) );

					}

				}

				// plane

				this.boundryBox = null;

				this.get_boundryBox = function ( ) {

					if ( ! self.boundryBox ) {

						self.boundryBox = new THREE.Box3 ( ).setFromObject ( self.colladaImport )

						console.log ( "boundry box" );
					}

					return self.boundryBox;
				}

				this.plane_color = grey;

				this.plane = null;
				this.plane_visible = false;

				this.get_plane = function ( ) {

					if ( ! self.plane ) {

						const planeWidth  = 1;
						const planeLength = 1;

						let planeGeometry = new THREE.PlaneGeometry ( planeWidth, planeLength );
						let planeMaterial = new THREE.MeshBasicMaterial ( {color: this.plane_color, side: THREE.DoubleSide} );

						self.plane = new THREE.Mesh ( planeGeometry, planeMaterial );

						self.plane.rotation.x = - ( 0.5 * Math.PI );

						self.plane.position.y = self.boundryBox.min.y;

						self.plane.receiveShadow = true;

						console.log ( "plane" );

					}

					return self.plane;
				}

				this.plane_ = function ( ) {

					self.boundryBox = self.get_boundryBox ( );

					if ( this.plane_visible ) {

						this.plane_visible = false;

						self.scene.remove ( self.get_plane ( ) );

					}

					else {

						this.plane_visible = true;

						self.scene.add ( self.get_plane ( ) );
					}
				}

				// edges toggle

				var edgesVisible = true;

				this.edgesToggle_ = function ( ) {

					edgesVisible = !edgesVisible;

					self.colladaImport.traverse ( function ( node ) {

						if ( node.isLineSegments ) {

							node.visible = edgesVisible;

						}

					} );

				}

				// wireframe toggle

				var wireframeVisible = false;
				var facesVisible = true;

				this.wireframeToggle_ = function ( ) {

					// disable edges

					self.edgesToggle_ ( );

					wireframeVisible = !wireframeVisible;
					facesVisible = !facesVisible;

					self.colladaImport.traverse ( function ( node ) {

						if ( node.isMesh ) {

							if ( node.material.wireframe ) {

								node.visible = wireframeVisible;

							}

							else {

								node.visible = facesVisible;

							}

						}

					});

				}

				// camera toggle

				this.cameraToggle_ = function ( ) {

					self.position = self.camera.position.clone ( );

					self.camera = self.camera.isPerspectiveCamera ? self.orthographicCamera : self.perspectiveCamera;

					self.cameraType = self.camera.isPerspectiveCamera ? 'perspective' : 'orthographic';

					// self.camera.position.copy ( self.position );

					self.transformControls.camera = self.camera;

					self.camera.zoom = 2;

					if ( self.camera.isOrthographicCamera ) {

						self.orbitControls = new OrbitControls ( self.camera, self.renderer.domElement );

						self.camera.zoom = 3000;

					}

					self.camera.lookAt ( 0, 0, 0 );

					self.camera.updateProjectionMatrix ( );

					self.resize ( );

					console.log ( "camera = " + self.cameraType );

				}

				// camera position toggle

				this.cameraPositionToggle_ = function ( ) {

					self.camera = self.orthographicCamera

					self.orbitControls = new OrbitControls ( self.camera, self.renderer.domElement );

					self.camera.position.set ( self.cameraPositionMatrix_x, self.cameraPositionMatrix_y, self.cameraPositionMatrix_z );

					self.camera.zoom = 3000;

					self.camera.lookAt ( 0, 0, 0 );

					self.camera.updateProjectionMatrix ( );

					console.log ( "camera position = " + self.cameraPositionMatrix_x, self.cameraPositionMatrix_y, self.cameraPositionMatrix_z );

				}

				// view toggle

				this.viewToggle_ = function ( ) {

					const randomViewFactor  = ( Math.random ( ) + 0.1 );

					const randomFieldOfView = randomViewFactor;
					const randomZoom        = randomViewFactor;

					const perspectiveRandomFieldOfView  = ( randomFieldOfView * 160 );
					const perspectiveRandomZoom         = ( randomZoom * 5 );

					const orthographicRandomFieldOfView = ( randomFieldOfView * 500 );
					const orthographicRandomZoom        = ( randomZoom * 5 * 1000 );

					self.perspectiveCamera.fov = ( perspectiveRandomFieldOfView );

					self.perspectiveCamera.zoom = ( perspectiveRandomZoom );

					self.orthographicCamera.bottom = - ( orthographicRandomFieldOfView );

					self.orthographicCamera.top = ( orthographicRandomFieldOfView );

					self.orthographicCamera.zoom = ( orthographicRandomZoom );

					self.resize ( );

				}

				// transform toggle

				this.transformToggle_ = function ( ) {

					self.transformControls.enabled = ! self.transformControls.enabled;

					self.orbitControls.enabled = ! self.orbitControls.enabled;

					self.transformControls.showX = ! self.transformControls.showX;

					self.transformControls.showY = ! self.transformControls.showY;

					self.transformControls.showZ = ! self.transformControls.showZ;

					console.log ( "orbitControls enabled = " + self.orbitControls.enabled );

					console.log ( "transformControls enabled = " + self.transformControls.enabled );

					if ( self.transformControls.enabled ) {

						var transformStatus = "active";

					}

					else {

						var transformStatus = "inctive";

					 }

					console.log ( "transform mode = " + transformStatus );

				}

				// controls space toggle

				this.controlsSpace_ = function ( ) {

					self.transformControls.setSpace ( self.transformControls.space === "world" ? "local" : "world" );

					console.log ( "control space = " + self.transformControls.space );

				}

				// snap toggle

				this.snapToggle_ = function ( ) {

					let snapFactor = 0.25;

					const translationSnap = ( snapFactor * 10 );
					const rotationSnap = ( THREE.MathUtils.degToRad ( 360 / 24 ) );
