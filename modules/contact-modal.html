<!-- scripts -->

<script src="/javascript/contact.js" type="text/javascript"></script>

<!-- contact modal -->

<input class="modal-state" id="modal-contact" type="checkbox"/>

<div class="modal">

	<label class="modal-background" for="modal-contact"></label>

	<div class="modal-content">

		<div class="container">

			<label class="modal-close" for="modal-contact"></label>

			<form action="https://api.web3forms.com/submit" method="POST" id="form">

				<div class="section text-bold">

					// CONTACT //

				</div>

				<input type="hidden" name="access_key" value="e6aeb229-ef10-41ea-8f45-bfdfa840d83d"/>

				<input type="hidden" name="subject" value="MECHA // BLOCKS - INQUIRY"/>

				<input type="hidden" name="redirect" value="https://mechablocks.com"/>

				<input type="checkbox" name="botcheck" id="" style="display:none;"/>

				<div>

					<input type="text" name="model-id" id="model-id" placeholder="MODEL ID" class="modal-input">

				</div>

				<div>

					<input type="text" name="model-name" id="model-name" placeholder="MODEL NAME" class="modal-input">

				</div>

				<div>

					<input type="text" name="first name" id="first-name" placeholder="FIRST NAME" required class="modal-input" autocomplete="off">

				</div>

				<div>

					<input type="text" name="last name" id="last-name" placeholder="LAST NAME" required class="modal-input" autocomplete="off">

				</div>

				<div>

					<input type="email" name="e-mail address" id="email" placeholder="ADDRESS@DOMAIN.COM" required class="modal-input" autocomplete="off">

				</div>

				<div>

					<input type="text" name="phone number" id="phone" placeholder="+1 (234) 567-8901" required class="modal-input" autocomplete="off">

				</div>

				<div>

					<textarea rows="10" name="message" id="message" placeholder="MESSAGE" required class="modal-message"></textarea>

				</div>

				<div class="section">

					</hr>

				</div>

				<div>

					<button type="submit" class="modal-button text-bold">

						SEND

					</button>

				</div>

			</form>

		</div>

	</div>

</div>
